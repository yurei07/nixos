name: Build Live ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build ISO
        run: |
          nix build .#nixosConfigurations.iso.config.system.build.isoImage \
            --no-link \
            --print-out-paths \
            -L

      - name: Copy ISO
        run: |
          OUT=$(nix build .#nixosConfigurations.iso.config.system.build.isoImage \
            --no-link --print-out-paths 2>/dev/null)
          cp $OUT/iso/*.iso ./nixos-prizrak-live.iso
          echo "ISO size: $(du -sh nixos-prizrak-live.iso)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixos-prizrak-live
          path: nixos-prizrak-live.iso
          retention-days: 14

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: nixos-prizrak-live.iso
          generate_release_notes: true
